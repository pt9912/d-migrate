name: Integration Tests

# Run Testcontainers-based integration tests for the JDBC drivers.
# These need Docker (for the database containers) and are too slow for the
# default Build & Test workflow (>5 min budget). They run on every push and PR
# to develop/main, but in a separate job that does NOT block the main build.
#
# Activation: Tests tagged @Tag("integration") are excluded from the default
# `./gradlew test` (see root build.gradle.kts) and only run when the
# `-PintegrationTests` Gradle property is set.

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run integration tests (Testcontainers PostgreSQL + MySQL)
        run: >-
          ./gradlew
          -PintegrationTests
          :d-migrate-driver-postgresql:test
          :d-migrate-driver-mysql:test
          :d-migrate-cli:test

      - name: Verify driver coverage with integration tests
        run: >-
          ./gradlew
          -PintegrationTests
          :d-migrate-driver-postgresql:koverVerify
          :d-migrate-driver-mysql:koverVerify
          :d-migrate-cli:koverVerify

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 14

      - name: Upload integration coverage reports
        if: always()
        run: >-
          ./gradlew
          -PintegrationTests
          :d-migrate-driver-postgresql:koverHtmlReport
          :d-migrate-driver-mysql:koverHtmlReport
          :d-migrate-cli:koverHtmlReport

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-coverage-reports
          path: '**/build/reports/kover/html/**'
          retention-days: 14
