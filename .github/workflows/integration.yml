name: Integration Tests

# Run Testcontainers-based integration tests for the JDBC drivers.
# These need Docker (for the database containers) and are too slow for the
# default Build & Test workflow (>5 min budget). They run on every push and PR
# to develop/main, but in a separate job that does NOT block the main build.
#
# Activation: Tests tagged @Tag("integration") are excluded from the default
# `./gradlew test` (see root build.gradle.kts) and only run when the
# `-PintegrationTests` Gradle property is set.

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest

    env:
      # Speicher-Budget auf dem ubuntu-latest-Runner (16 GB):
      #  - Gradle-Daemon: 4 GB aus gradle.properties (unveraendert)
      #  - Forked Test-JVM: 4 GB via maxHeapSize in build.gradle.kts,
      #    aktiv unter `-PintegrationTests` (oder explizit ueber
      #    `-PtestMaxHeapSize=Xg`)
      #  - Testcontainers (PG/MySQL/...): uebrige ~8 GB
      # GRADLE_OPTS gilt fuer den Launcher-/Daemon-JVM; damit liegt der
      # Gradle-Scheduler selbst bequem ueber dem Default.
      GRADLE_OPTS: "-Xmx4g"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Django
        run: pip install --quiet django

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run integration tests (all modules with @integration tag)
        # Plan §6.16: generischer Aufruf, sodass neue integration-Tests in
        # beliebigen Modulen automatisch mitlaufen, ohne dass dieser Workflow
        # angepasst werden muss. Mit -PintegrationTests aktiviert das
        # Root-build.gradle.kts den `integration`-Tag für alle Test-Tasks.
        #
        # --no-build-cache: siehe Begruendung in build.yml — kover-Verify
        # darf keine stale `.exec`-Daten aus dem setup-gradle Cache-
        # Restore sehen, sonst gibt es knapp-unter-90% Boundary-Flakes.
        run: ./gradlew test koverVerify :koverVerify -PintegrationTests --no-build-cache

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 14

      - name: Generate integration coverage HTML
        if: always()
        run: ./gradlew koverHtmlReport -PintegrationTests

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-coverage-reports
          path: '**/build/reports/kover/html/**'
          retention-days: 14
