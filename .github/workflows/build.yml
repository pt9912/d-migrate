name: Build & Test

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write

env:
  DMIGRATE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: ${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build, test and verify coverage
        run: ./gradlew build koverVerify

      - name: Generate coverage reports
        if: always()
        run: >-
          ./gradlew
          :hexagon:core:koverHtmlReport
          :hexagon:ports-common:koverHtmlReport
          :hexagon:ports-read:koverHtmlReport
          :hexagon:ports-write:koverHtmlReport
          :hexagon:application:koverHtmlReport
          :hexagon:profiling:koverHtmlReport
          :adapters:driven:driver-common:koverHtmlReport
          :adapters:driven:driver-postgresql:koverHtmlReport
          :adapters:driven:driver-postgresql-profiling:koverHtmlReport
          :adapters:driven:driver-mysql:koverHtmlReport
          :adapters:driven:driver-mysql-profiling:koverHtmlReport
          :adapters:driven:driver-sqlite:koverHtmlReport
          :adapters:driven:driver-sqlite-profiling:koverHtmlReport
          :adapters:driven:formats:koverHtmlReport
          :adapters:driven:integrations:koverHtmlReport
          :adapters:driven:streaming:koverHtmlReport
          :adapters:driving:cli:koverHtmlReport

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 14

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-reports
          path: '**/build/reports/kover/html/**'
          retention-days: 14

      - name: Build release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew :adapters:driving:cli:assembleReleaseAssets

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v6
        with:
          name: release-assets
          path: adapters/driving/cli/build/release/*
          retention-days: 14

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build OCI image locally
        run: ./gradlew :adapters:driving:cli:jibDockerBuild

      - name: Login to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          docker tag dmigrate/d-migrate:latest ghcr.io/${{ github.repository }}:latest
          docker tag dmigrate/d-migrate:latest ghcr.io/${{ github.repository }}:${VERSION}
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${VERSION}
